name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 7 * * 1"  # every Monday at 07:00 UTC

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: |
          ruff check app/
          ruff format --check app/

      - name: Test
        run: pytest
