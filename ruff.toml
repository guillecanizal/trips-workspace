line-length = 99

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "S",     # flake8-bandit (security)
    "UP",    # pyupgrade
    "RUF",   # ruff-specific rules
]
ignore = [
    "E501",  # line too long (let formatter handle it)
]

[lint.per-file-ignores]
"app/routes.py" = ["E302"]  # allow tighter spacing in large route file

[format]
quote-style = "double"
indent-style = "space"
