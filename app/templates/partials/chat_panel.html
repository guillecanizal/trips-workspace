<div x-data="chatPanel({{ chat_trip_id }}, {{ chat_day_id or 'null' }})"
     x-ref="panel"
     :style="`height: ${minimized ? 44 : panelHeight}px`"
     class="flex flex-col bg-[#dde3ea] border border-slate-300/20 border-b-0 rounded-t-xl overflow-hidden shadow-2xl"
     hx-disable>

  {# Drag handle #}
  <div @mousedown="startDrag($event)"
       class="flex-shrink-0 h-1.5 bg-slate-600/40 hover:bg-blue-500/60 cursor-ns-resize transition-colors select-none"></div>

  {# Header #}
  <div class="flex items-center justify-between px-4 py-2 border-b border-slate-200 flex-shrink-0 bg-[#0f172a]">
    <div class="flex items-center gap-3">
      <button type="button" @click="toggleMinimize()"
              class="text-slate-500 hover:text-slate-200 transition" :title="minimized ? 'Expand' : 'Minimise'">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor">
          <path x-show="!minimized" fill-rule="evenodd"
                d="M14.707 12.707a1 1 0 01-1.414 0L10 9.414l-3.293 3.293a1 1 0 01-1.414-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 010 1.414z"
                clip-rule="evenodd"/>
          <path x-show="minimized" x-cloak fill-rule="evenodd"
                d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                clip-rule="evenodd"/>
        </svg>
      </button>
      <span class="text-xs font-semibold text-slate-300 uppercase tracking-wider">
        {% if chat_day_id %}Day Chat{% else %}Trip Chat{% endif %}
      </span>
    </div>
    <button type="button" @click="clearHistory()" class="text-xs text-slate-500 hover:text-slate-300">New chat</button>
  </div>

  {# Messages #}
  <div x-ref="chatLog" class="flex-1 overflow-y-auto px-4 py-2 flex flex-col gap-2 scroll-smooth">
    <template x-for="(msg, i) in messages" :key="i">
      <div class="flex flex-col">
        {# Text bubble #}
        <div :class="msg.role === 'user'
              ? 'self-end bg-[#1e293b] text-white rounded-xl rounded-br-sm'
              : 'self-start bg-white text-slate-800 rounded-xl rounded-bl-sm border border-slate-200'"
             class="max-w-[85%] px-3 py-1 text-sm whitespace-pre-wrap leading-tight">
          <span x-text="msg.content"></span>
        </div>
        {# Apply button for candidates #}
        <div x-show="msg.candidates" class="self-start mt-1">
          <button type="button" @click="applyCandidate(msg)"
                  class="text-xs bg-slate-800 hover:bg-slate-700 text-white px-3 py-1 rounded-full transition">
            <span x-text="msg._result && msg._result.task === 'propose_hotels' ? 'Use hotel' : 'Add activity'"></span>
          </button>
        </div>
      </div>
    </template>

    {# Typing indicator #}
    <div x-show="loading" x-cloak
         class="self-start flex items-center gap-2 bg-white border border-slate-200 rounded-xl rounded-bl-sm px-3 py-1.5 text-sm text-slate-400">
      <span class="flex gap-1">
        <span class="w-1.5 h-1.5 rounded-full bg-slate-400 typing-dot"></span>
        <span class="w-1.5 h-1.5 rounded-full bg-slate-400 typing-dot"></span>
        <span class="w-1.5 h-1.5 rounded-full bg-slate-400 typing-dot"></span>
      </span>
      <span x-text="statusText"></span>
    </div>
  </div>

  {# Input #}
  <form @submit.prevent="sendMessage()" class="flex-shrink-0 px-4 py-2 border-t border-slate-300/60 bg-[#d3dae2]">
    <div class="flex gap-2">
      <textarea x-model="input" x-ref="chatInput"
                rows="1" placeholder="Ask for hotel ideas, activities..."
                @keydown.enter.prevent="if(!$event.shiftKey) sendMessage()"
                :disabled="loading"
                class="flex-1 bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-800 resize-none
                       focus:outline-none focus:border-slate-500 focus:ring-1 focus:ring-slate-400
                       disabled:opacity-50 placeholder-slate-400"></textarea>
      <button type="submit" :disabled="loading || !input.trim()"
              class="bg-[#1e293b] hover:bg-[#0f172a] disabled:opacity-40 text-white text-sm font-semibold px-4 rounded-lg transition">
        <span x-show="!loading">Send</span>
        <span x-show="loading" @click.stop="cancelRequest()">Stop</span>
      </button>
    </div>
  </form>
</div>
