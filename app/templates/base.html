<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trip Planner</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2933;
        background-color: #f8fafc;
      }
      body {
        margin: 0;
      }
      header {
        background: #1d4ed8;
        color: white;
        padding: 1rem;
      }
      main {
        padding: 1.5rem;
        max-width: 900px;
        margin: 0 auto;
      }
      a {
        color: #1d4ed8;
      }
      form {
        margin-bottom: 1.5rem;
        padding: 1rem;
        background: white;
        border-radius: 0.5rem;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.1);
      }
      label {
        font-weight: 600;
        display: block;
        margin-top: 0.75rem;
      }
      input,
      textarea {
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.25rem;
        border: 1px solid #cbd5f5;
        border-radius: 0.375rem;
        box-sizing: border-box;
      }
      button {
        margin-top: 1rem;
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 0.375rem;
        background: #1d4ed8;
        color: white;
        cursor: pointer;
      }
      button.secondary {
        background: #475569;
      }
      button.danger {
        background: #dc2626;
      }
      .inline-form {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }
      .inline-form button {
        margin-top: 0;
      }
      .card {
        background: white;
        border-radius: 0.5rem;
        padding: 1rem;
        margin-bottom: 1rem;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      }
      details {
        background: white;
        border-radius: 0.5rem;
        margin-bottom: 1rem;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
        padding: 0.25rem 0.75rem 0.75rem;
      }
      details summary {
        cursor: pointer;
        list-style: none;
        font-weight: 600;
        padding: 0.75rem 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      details[open] summary {
        border-bottom: 1px solid #e2e8f0;
        margin-bottom: 0.75rem;
      }
      details summary::-webkit-details-marker {
        display: none;
      }
      .trip-summary-title {
        display: flex;
        flex-direction: column;
      }
      .summary-meta {
        font-size: 0.85rem;
        color: #475569;
      }
      .panel-body {
        padding-top: 0.5rem;
      }
      .day-summary {
        border: 1px solid #e2e8f0;
        border-radius: 0.375rem;
        padding: 0.75rem;
        margin-top: 0.75rem;
        background: #f8fafc;
      }
      .day-panel summary {
        font-weight: 600;
      }
      .day-panel .panel-body {
        padding-top: 0.25rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 0.5rem;
      }
      th,
      td {
        border: 1px solid #e2e8f0;
        padding: 0.4rem;
        text-align: left;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 0.75rem;
        margin: 0.75rem 0 1rem;
      }
      .stat-card {
        background: #eef2ff;
        border-radius: 0.5rem;
        padding: 0.75rem;
      }
      .stat-card span {
        display: block;
        font-size: 0.85rem;
        color: #475569;
      }
      .stat-card strong {
        font-size: 1.2rem;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Trip Planner</strong>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
