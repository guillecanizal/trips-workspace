<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trip Planner</title>
    <style>
      :root {
        font-family: "IBM Plex Sans", "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #e2e8f0;
        background-color: #0b1220;
        font-size: 15px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background-color: #0b1220;
      }
      header {
        background: linear-gradient(135deg, #050914, #1d2e52);
        color: #f8fafc;
        padding: 1.5rem;
        box-shadow: 0 12px 30px rgba(2, 6, 23, 0.7);
      }
      main {
        padding: 2rem;
        max-width: 1100px;
        margin: 0 auto;
        background: #0e1728;
        border-radius: 1.25rem;
        box-shadow: 0 20px 60px rgba(2, 6, 23, 0.65);
        margin-top: 2rem;
        margin-bottom: 2rem;
      }
      a {
        color: #93c5fd;
      }
      form {
        margin-bottom: 1.5rem;
        padding: 1rem;
        background: #111a2d;
        border-radius: 0.9rem;
        box-shadow: 0 15px 45px rgba(2, 6, 23, 0.55);
        border: 1px solid #1f2f4f;
      }
      label {
        font-weight: 600;
        display: block;
        margin-top: 0.75rem;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 0.65rem 0.75rem;
        margin-top: 0.25rem;
        border: 1px solid #203354;
        border-radius: 0.55rem;
        background: #0d182b;
        font-size: 0.95rem;
        color: #f8fafc;
      }
      input[data-filled="false"],
      textarea[data-filled="false"],
      select[data-filled="false"] {
        background: #0b1424;
        border-color: #1a2843;
        color: #7d8db4;
      }
      input[data-filled="true"],
      textarea[data-filled="true"],
      select[data-filled="true"] {
        background: #132443;
        border-color: #2f4f7a;
        color: #f8fafc;
        box-shadow: inset 0 0 0 1px rgba(47, 79, 122, 0.3);
      }
      input[readonly],
      textarea[readonly] {
        background: #0f1f36;
        color: #8fa3c5;
        cursor: pointer;
      }
      input::placeholder,
      textarea::placeholder {
        color: #94a3c7;
        opacity: 1;
      }
      button {
        margin-top: 1rem;
        padding: 0.6rem 1.2rem;
        border: none;
        border-radius: 0.5rem;
        background: #1d4ed8;
        color: #f8fafc;
        cursor: pointer;
        font-weight: 600;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.45);
      }
      button.secondary {
        background: #1e3a8a;
      }
      button.danger {
        background: #0f172a;
      }
      .grid {
        display: grid;
        gap: 1.5rem;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      }
      .ai-launcher {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 1rem;
      }
      .ai-toggle {
        font-weight: 600;
        gap: 0.35rem;
        display: inline-flex;
        align-items: center;
      }
      .ai-sidebar-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.35);
        z-index: 90;
      }
      .ai-sidebar {
        position: fixed;
        top: 0;
        right: 0;
        width: min(420px, 92%);
        height: 100%;
        background: #0d0d0d;
        color: #f8fafc;
        box-shadow: -10px 0 45px rgba(0, 0, 0, 0.45);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        z-index: 95;
        overflow-y: auto;
      }
      .ai-sidebar[hidden],
      .ai-sidebar-backdrop[hidden] {
        display: none !important;
      }
      .ai-sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(248, 250, 252, 0.1);
        padding-bottom: 0.5rem;
      }
      .ai-tabs {
        display: flex;
        gap: 0.5rem;
        border-bottom: 1px solid rgba(248, 250, 252, 0.08);
        padding-bottom: 0.5rem;
      }
      .ai-tab {
        flex: 1;
        text-align: center;
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 0.35rem 0.4rem;
        background: transparent;
        color: #d1d5db;
        cursor: pointer;
        font-weight: 600;
      }
      .ai-tab.active {
        background: #f8fafc;
        color: #0f172a;
      }
      .ai-section {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        border: 1px solid rgba(248, 250, 252, 0.08);
        border-radius: 0.6rem;
        padding: 0.9rem;
        background: #181818;
      }
      .ai-section-head {
        display: flex;
        justify-content: space-between;
        gap: 0.8rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .ai-section-title {
        font-weight: 600;
        margin: 0;
        color: #f8fafc;
      }
      .ai-warning {
        margin: 0;
        font-size: 0.85rem;
        color: #f97316;
      }
      .ai-head-actions {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.35rem;
      }
      .ai-head-actions small {
        color: #d1d5db;
      }
      .ai-generate-btn {
        border: 1px solid rgba(248, 250, 252, 0.4);
        border-radius: 999px;
        padding: 0.35rem 0.9rem;
        background: transparent;
        color: #f8fafc;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        cursor: pointer;
      }
      .ai-generate-btn:hover {
        background: rgba(248, 250, 252, 0.1);
      }
      .ai-generate-btn.secondary {
        border-color: rgba(248, 250, 252, 0.25);
        color: #d1d5db;
      }
      .ai-generate-btn.secondary:hover {
        background: rgba(248, 250, 252, 0.08);
      }
      .ai-btn-icon {
        font-size: 1rem;
      }
      .ai-chat-log {
        min-height: 150px;
        max-height: 280px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        padding: 0.6rem;
        background: #0b0b0b;
        border: 1px solid rgba(248, 250, 252, 0.08);
        border-radius: 0.5rem;
      }
      .ai-chat-entry {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        font-size: 0.9rem;
      }
      .ai-chat-entry.user {
        color: #60a5fa;
      }
      .ai-chat-entry.assistant {
        color: #e2e8f0;
      }
      .ai-chat-entry pre {
        background: #090909;
        border-radius: 0.35rem;
        padding: 0.4rem;
        overflow-x: auto;
      }
      .ai-chat-actions {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .ai-chat-action-card {
        border: 1px solid rgba(248, 250, 252, 0.15);
        border-radius: 0.5rem;
        padding: 0.6rem;
        background: #111;
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }
      .ai-chat-form textarea {
        background: #0b0b0b;
        color: #f8fafc;
        border: 1px solid rgba(248, 250, 252, 0.15);
        border-radius: 0.45rem;
        padding: 0.5rem;
      }
      body.ai-sidebar-open {
        overflow: hidden;
      }
      .trip-card {
        border-radius: 1rem;
        padding: 1.3rem;
        background: #111c31;
        border: 1px solid #1f2f4f;
        box-shadow: 0 18px 45px rgba(2, 6, 23, 0.6);
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .trip-card h2 {
        margin: 0;
        font-size: 1.3rem;
      }
      .trip-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        color: #94a3b8;
        font-size: 0.9rem;
      }
      .pill {
        background: #1d2b45;
        padding: 0.25rem 0.65rem;
        border-radius: 999px;
        font-size: 0.8rem;
        color: #c7d2fe;
      }
      .section-card {
        margin-bottom: 1.5rem;
        padding: 1.25rem;
        background: #101a30;
        border-radius: 0.9rem;
        border: 1px solid #1f2f4f;
        box-shadow: 0 18px 40px rgba(2, 6, 23, 0.55);
      }
      details.trip-panel {
        border-radius: 1rem;
        border: 1px solid #1f2f4f;
        box-shadow: 0 18px 40px rgba(2, 6, 23, 0.55);
        background: #101a30;
        margin-bottom: 1.5rem;
        padding: 0 1.25rem 1rem;
      }
      details.trip-panel summary {
        cursor: pointer;
        list-style: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 0;
        font-weight: 600;
      }
      details.trip-panel[open] summary {
        border-bottom: 1px solid #1f2f4f;
        margin-bottom: 1rem;
      }
      details.trip-panel summary::-webkit-details-marker { display:none; }
      .table-like {
        width: 100%;
        border-collapse: collapse;
        margin-top: 0.5rem;
      }
      .table-like th,
      .table-like td {
        border-bottom: 1px solid #1f2f4f;
        padding: 0.6rem 0.75rem;
        text-align: left;
      }
      .inline-form {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        padding: 0.5rem 0;
      }
      .inline-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        justify-content: space-between;
      }
      .inline-wrapper {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.5rem;
        width: 100%;
      }
      .inline-delete {
        margin-top: 0.3rem;
      }
      .action-icons {
        display: flex;
        gap: 0.4rem;
      }
      .icon-button {
        background: transparent;
        border: none;
        color: #a5b4fc;
        cursor: pointer;
        font-size: 0.95rem;
        padding: 0.25rem;
        transition: color 0.15s ease;
      }
      .icon-button.danger {
        color: #c7d2fe;
      }
      .icon-button.save {
        color: #93c5fd;
      }
      .icon-button.add {
        color: #a5b4fc;
      }
      .inline-form input,
      .inline-form textarea,
      .inline-form select {
        background: transparent;
        border: 1px solid transparent;
        border-radius: 0.4rem;
        padding: 0.4rem 0.6rem;
        margin: 0;
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 0.95rem;
        color: #f1f5f9;
        transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      }
      .inline-form:not(.readonly) input,
      .inline-form:not(.readonly) textarea,
      .inline-form:not(.readonly) select {
        background: #0f1f36;
        border-color: #2a3f63;
      }
      .inline-form:not(.readonly) input:focus,
      .inline-form:not(.readonly) textarea:focus,
      .inline-form:not(.readonly) select:focus {
        outline: none;
        border-color: #5b73a6;
        box-shadow: 0 0 0 1px rgba(93, 117, 166, 0.4);
      }
      .inline-form.readonly input,
      .inline-form.readonly textarea,
      .inline-form.readonly select {
        pointer-events: none;
        color: #94a3c7;
      }
      .inline-form.readonly input[data-filled="true"],
      .inline-form.readonly textarea[data-filled="true"],
      .inline-form.readonly select[data-filled="true"] {
        color: #f8fafc;
      }
      .inline-form.readonly input[data-filled="false"],
      .inline-form.readonly textarea[data-filled="false"],
      .inline-form.readonly select[data-filled="false"] {
        color: #5f6f94;
      }
      .inline-form input::placeholder,
      .inline-form textarea::placeholder {
        color: #8493b7;
      }
      .flash-container {
        margin: 1rem auto;
        max-width: 1100px;
      }
      .flash {
        padding: 0.9rem 1.1rem;
        border-radius: 0.5rem;
        margin-bottom: 0.75rem;
        color: #e2e8f0;
      }
      .flash-success {
        background: #132640;
        border: 1px solid #264975;
      }
      .flash-error {
        background: #1b2235;
        border: 1px solid #2d3f63;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Trips Workspace</strong>
    </header>
    <main>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-container">
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const fields = document.querySelectorAll('input:not([type="checkbox"]):not([type="radio"]):not([type="hidden"]):not([type="submit"]):not([type="button"]), textarea, select');
        const updateFilledState = (field) => {
          const value = field.tagName === 'SELECT' ? field.value : field.value.trim();
          field.dataset.filled = value ? 'true' : 'false';
        };
        fields.forEach((field) => {
          updateFilledState(field);
          const eventName = field.tagName === 'SELECT' ? 'change' : 'input';
          field.addEventListener(eventName, () => updateFilledState(field));
        });

        document.querySelectorAll('[data-inline-form]').forEach((form) => {
          form.classList.add('readonly');
          const toggleEditable = () => {
            form.classList.remove('readonly');
            form.querySelectorAll('input, textarea, select').forEach((el) => {
              el.removeAttribute('readonly');
              el.removeAttribute('disabled');
            });
            const submit = form.querySelector('.inline-save');
            if (submit) {
              submit.disabled = false;
            }
          };
          form.addEventListener('dblclick', toggleEditable);
        });

        document.querySelectorAll('form[data-ai-generate]').forEach((form) => {
          const button = form.querySelector('button');
          form.addEventListener('submit', () => {
            if (button) {
              button.disabled = true;
              button.dataset.originalText = button.textContent;
              button.textContent = 'Generating…';
            }
          });
        });

        document.querySelectorAll('[data-itinerary-maps]').forEach((trigger) => {
          trigger.addEventListener('click', async (event) => {
            event.preventDefault();
            const url = trigger.getAttribute('data-itinerary-maps');
            if (!url || trigger.dataset.loading === 'true') {
              return;
            }
            trigger.dataset.loading = 'true';
            try {
              const response = await fetch(url);
              if (!response.ok) {
                throw new Error('Failed to build itinerary');
              }
              const data = await response.json();
              if (data && data.url) {
                window.open(data.url, '_blank');
              } else {
                alert(data?.error || 'Not enough hotel information to build a route.');
              }
            } catch (error) {
              alert(error.message || 'Unable to build itinerary.');
            } finally {
              delete trigger.dataset.loading;
            }
          });
        });

        const aiSidebar = document.getElementById('ai-sidebar');
        const aiBackdrop = document.getElementById('ai-sidebar-backdrop');
        const aiOpenButton = document.getElementById('ai-open-button');
        const aiCloseButton = document.querySelector('[data-ai-close]');
        const setAiSidebar = (open) => {
          if (!aiSidebar || !aiBackdrop) {
            return;
          }
          if (open) {
            aiSidebar.hidden = false;
            aiBackdrop.hidden = false;
            aiSidebar.setAttribute('aria-hidden', 'false');
            document.body.classList.add('ai-sidebar-open');
          } else {
            aiSidebar.hidden = true;
            aiBackdrop.hidden = true;
            aiSidebar.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('ai-sidebar-open');
          }
        };
        aiBackdrop?.addEventListener('click', () => setAiSidebar(false));
        aiCloseButton?.addEventListener('click', () => setAiSidebar(false));
        aiOpenButton?.addEventListener('click', () => setAiSidebar(true));
        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') {
            setAiSidebar(false);
          }
        });

        document.querySelectorAll('[data-copy-target]').forEach((button) => {
          button.addEventListener('click', async () => {
            const targetId = button.getAttribute('data-copy-target');
            const target = document.getElementById(targetId);
            if (!target) {
              return;
            }
            const value = target.value || target.textContent || '';
            try {
              await navigator.clipboard.writeText(value);
              button.textContent = '✅';
              setTimeout(() => {
                button.textContent = '📋';
              }, 1200);
            } catch (error) {
              alert('Unable to copy content.');
            }
          });
        });

        const aiTabs = document.querySelectorAll('.ai-tab');
        const oneshotPanel = document.getElementById('ai-oneshot-panel');
        const jsonPanel = document.getElementById('ai-json-panel');
        const chatPanel = document.getElementById('ai-chat-panel');
        const toggleSection = (section, show) => {
          if (!section) return;
          if (show) {
            section.removeAttribute('hidden');
            section.style.display = '';
          } else {
            section.setAttribute('hidden', 'true');
            section.style.display = 'none';
          }
        };
        const setAiMode = (mode) => {
          window.__openAISidebarMode = mode;
          aiTabs.forEach((tab) => tab.classList.toggle('active', tab.dataset.aiMode === mode));
          if (mode === 'chat') {
            toggleSection(oneshotPanel, false);
            toggleSection(jsonPanel, false);
            toggleSection(chatPanel, true);
          } else {
            toggleSection(oneshotPanel, true);
            toggleSection(jsonPanel, true);
            toggleSection(chatPanel, false);
          }
        };
        aiTabs.forEach((tab) => {
          tab.addEventListener('click', () => setAiMode(tab.dataset.aiMode || 'oneshot'));
        });

        const chatLog = document.getElementById('ai-chat-log');
        const chatActions = document.getElementById('ai-chat-actions');
        const chatForm = document.getElementById('ai-chat-form');
        const chatInput = document.getElementById('ai-chat-input');
        const TRIP_ID = window.__TRIP_ID;
        let pendingPatch = null;

        const appendChat = (role, content, isJson = false) => {
          if (!chatLog) return;
          const entry = document.createElement('div');
          entry.className = `ai-chat-entry ${role}`;
          const label = document.createElement('strong');
          label.textContent = role === 'user' ? 'You' : 'Assistant';
          entry.appendChild(label);
          if (isJson) {
            const pre = document.createElement('pre');
            pre.textContent = content;
            entry.appendChild(pre);
          } else {
            const span = document.createElement('span');
            span.textContent = content;
            entry.appendChild(span);
          }
          chatLog.appendChild(entry);
          chatLog.scrollTop = chatLog.scrollHeight;
        };

        const renderPendingPatch = () => {
          if (!chatActions) return;
          chatActions.innerHTML = '';
          if (!pendingPatch) {
            chatActions.setAttribute('hidden', 'true');
            return;
          }
          chatActions.removeAttribute('hidden');
          if (pendingPatch.type === 'hotel_proposals') {
            const list = document.createElement('div');
            pendingPatch.candidates?.forEach((candidate, index) => {
              const card = document.createElement('div');
              card.className = 'ai-chat-action-card';
              card.innerHTML = `<strong>${candidate.name || 'Hotel candidate'}</strong><span>${candidate.location || ''}</span><small>${candidate.description || candidate.notes || ''}</small>`;
              const btn = document.createElement('button');
              btn.className = 'ai-generate-btn';
              btn.type = 'button';
              btn.textContent = 'Apply hotel';
              btn.addEventListener('click', () => applyHotelCandidate(index));
              card.appendChild(btn);
              list.appendChild(card);
            });
            chatActions.appendChild(list);
          } else if (pendingPatch.type === 'activity_proposal' && pendingPatch.candidate) {
            const card = document.createElement('div');
            card.className = 'ai-chat-action-card';
            card.innerHTML = `<strong>${pendingPatch.candidate.name}</strong><span>${pendingPatch.candidate.location || ''}</span><small>${pendingPatch.candidate.summary || ''}</small>`;
            const btn = document.createElement('button');
            btn.className = 'ai-generate-btn';
            btn.type = 'button';
            btn.textContent = 'Apply activity';
            btn.addEventListener('click', () => applyActivityCandidate());
            card.appendChild(btn);
            chatActions.appendChild(card);
          }
        };

        const prettyJSON = (data) => {
          try {
            return JSON.stringify(data, null, 2);
          } catch (error) {
            return String(data);
          }
        };

        const parseJson = async (response) => {
          try {
            return await response.json();
          } catch (error) {
            return null;
          }
        };

        const callAgent = async (message) => {
          const response = await fetch('/agent', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ trip_id: TRIP_ID, message }),
          });
          const data = await parseJson(response);
          if (!response.ok) {
            const err = data?.error || 'Agent request failed';
            throw new Error(err);
          }
          return data || {};
        };

        const applyHotelCandidate = async (index) => {
          const day = pendingPatch?.day;
          if (!day) return;
          const payload = { trip_id: TRIP_ID, day, index };
          const response = await fetch('/apply/hotel', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await parseJson(response);
          if (!response.ok) throw new Error(data?.error || 'Failed to apply hotel');
          pendingPatch = null;
          renderPendingPatch();
          appendChat('assistant', prettyJSON(data || {}), true);
        };

        const applyActivityCandidate = async () => {
          const day = pendingPatch?.day;
          if (!day) return;
          const payload = { trip_id: TRIP_ID, day };
          const response = await fetch('/apply/activity', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await parseJson(response);
          if (!response.ok) throw new Error(data?.error || 'Failed to apply activity');
          pendingPatch = null;
          renderPendingPatch();
          appendChat('assistant', prettyJSON(data || {}), true);
        };

        if (chatForm && chatInput) {
          chatForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;
            appendChat('user', message);
            chatInput.value = '';
            try {
              const data = await callAgent(message);
              if (data.result) {
                appendChat('assistant', prettyJSON(data.result), true);
              }
              pendingPatch = data.pending_patch || null;
              renderPendingPatch();
            } catch (error) {
              appendChat('assistant', error.message || 'Agent error');
            }
          });
        }

        if (window.__openAISidebar) {
          setAiSidebar(true);
        }
        if (oneshotPanel || chatPanel) {
          setAiMode(window.__openAISidebarMode || 'oneshot');
        }

        const aiResponseForm = document.getElementById('ai-response-form');
        if (aiResponseForm) {
          aiResponseForm.addEventListener('submit', (event) => {
            if (!confirm('Applying the AI response will overwrite all manual changes. Continue?')) {
              event.preventDefault();
            }
          });
        }
      });
    </script>
  </body>
