<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trip Planner</title>
    <style>
      :root {
        font-family: "IBM Plex Sans", "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #e2e8f0;
        background-color: #0b1220;
        font-size: 15px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background-color: #0b1220;
      }
      header {
        background: linear-gradient(135deg, #050914, #1d2e52);
        color: #f8fafc;
        padding: 1.5rem;
        box-shadow: 0 12px 30px rgba(2, 6, 23, 0.7);
      }
      main {
        padding: 2rem;
        max-width: 1100px;
        margin: 0 auto;
        background: #0e1728;
        border-radius: 1.25rem;
        box-shadow: 0 20px 60px rgba(2, 6, 23, 0.65);
        margin-top: 2rem;
        margin-bottom: 2rem;
      }
      a {
        color: #93c5fd;
      }
      form {
        margin-bottom: 1.5rem;
        padding: 1rem;
        background: #111a2d;
        border-radius: 0.9rem;
        box-shadow: 0 15px 45px rgba(2, 6, 23, 0.55);
        border: 1px solid #1f2f4f;
      }
      label {
        font-weight: 600;
        display: block;
        margin-top: 0.75rem;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 0.65rem 0.75rem;
        margin-top: 0.25rem;
        border: 1px solid #203354;
        border-radius: 0.55rem;
        background: #0d182b;
        font-size: 0.95rem;
        color: #f8fafc;
      }
      input[data-filled="false"],
      textarea[data-filled="false"],
      select[data-filled="false"] {
        background: #0b1424;
        border-color: #1a2843;
        color: #7d8db4;
      }
      input[data-filled="true"],
      textarea[data-filled="true"],
      select[data-filled="true"] {
        background: #132443;
        border-color: #2f4f7a;
        color: #f8fafc;
        box-shadow: inset 0 0 0 1px rgba(47, 79, 122, 0.3);
      }
      input[readonly],
      textarea[readonly] {
        background: #0f1f36;
        color: #8fa3c5;
        cursor: pointer;
      }
      input::placeholder,
      textarea::placeholder {
        color: #94a3c7;
        opacity: 1;
      }
      button {
        margin-top: 1rem;
        padding: 0.6rem 1.2rem;
        border: none;
        border-radius: 0.5rem;
        background: #1d4ed8;
        color: #f8fafc;
        cursor: pointer;
        font-weight: 600;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.45);
      }
      button.secondary {
        background: #1e3a8a;
      }
      button.danger {
        background: #0f172a;
      }
      .grid {
        display: grid;
        gap: 1.5rem;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      }
      .trip-card {
        border-radius: 1rem;
        padding: 1.3rem;
        background: #111c31;
        border: 1px solid #1f2f4f;
        box-shadow: 0 18px 45px rgba(2, 6, 23, 0.6);
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .trip-card h2 {
        margin: 0;
        font-size: 1.3rem;
      }
      .trip-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        color: #94a3b8;
        font-size: 0.9rem;
      }
      .pill {
        background: #1d2b45;
        padding: 0.25rem 0.65rem;
        border-radius: 999px;
        font-size: 0.8rem;
        color: #c7d2fe;
      }
      .section-card {
        margin-bottom: 1.5rem;
        padding: 1.25rem;
        background: #101a30;
        border-radius: 0.9rem;
        border: 1px solid #1f2f4f;
        box-shadow: 0 18px 40px rgba(2, 6, 23, 0.55);
      }
      details.trip-panel {
        border-radius: 1rem;
        border: 1px solid #1f2f4f;
        box-shadow: 0 18px 40px rgba(2, 6, 23, 0.55);
        background: #101a30;
        margin-bottom: 1.5rem;
        padding: 0 1.25rem 1rem;
      }
      details.trip-panel summary {
        cursor: pointer;
        list-style: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 0;
        font-weight: 600;
      }
      details.trip-panel[open] summary {
        border-bottom: 1px solid #1f2f4f;
        margin-bottom: 1rem;
      }
      details.trip-panel summary::-webkit-details-marker { display:none; }
      .table-like {
        width: 100%;
        border-collapse: collapse;
        margin-top: 0.5rem;
      }
      .table-like th,
      .table-like td {
        border-bottom: 1px solid #1f2f4f;
        padding: 0.6rem 0.75rem;
        text-align: left;
      }
      .inline-form {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        padding: 0.5rem 0;
      }
      .inline-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        justify-content: space-between;
      }
      .inline-wrapper {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.5rem;
        width: 100%;
      }
      .inline-delete {
        margin-top: 0.3rem;
      }
      .action-icons {
        display: flex;
        gap: 0.4rem;
      }
      .icon-button {
        background: transparent;
        border: none;
        color: #a5b4fc;
        cursor: pointer;
        font-size: 0.95rem;
        padding: 0.25rem;
        transition: color 0.15s ease;
      }
      .icon-button.danger {
        color: #c7d2fe;
      }
      .icon-button.save {
        color: #93c5fd;
      }
      .icon-button.add {
        color: #a5b4fc;
      }
      .inline-form input,
      .inline-form textarea,
      .inline-form select {
        background: transparent;
        border: 1px solid transparent;
        border-radius: 0.4rem;
        padding: 0.4rem 0.6rem;
        margin: 0;
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 0.95rem;
        color: #f1f5f9;
        transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      }
      .inline-form:not(.readonly) input,
      .inline-form:not(.readonly) textarea,
      .inline-form:not(.readonly) select {
        background: #0f1f36;
        border-color: #2a3f63;
      }
      .inline-form:not(.readonly) input:focus,
      .inline-form:not(.readonly) textarea:focus,
      .inline-form:not(.readonly) select:focus {
        outline: none;
        border-color: #5b73a6;
        box-shadow: 0 0 0 1px rgba(93, 117, 166, 0.4);
      }
      .inline-form.readonly input,
      .inline-form.readonly textarea,
      .inline-form.readonly select {
        pointer-events: none;
        color: #94a3c7;
      }
      .inline-form.readonly input[data-filled="true"],
      .inline-form.readonly textarea[data-filled="true"],
      .inline-form.readonly select[data-filled="true"] {
        color: #f8fafc;
      }
      .inline-form.readonly input[data-filled="false"],
      .inline-form.readonly textarea[data-filled="false"],
      .inline-form.readonly select[data-filled="false"] {
        color: #5f6f94;
      }
      .inline-form input::placeholder,
      .inline-form textarea::placeholder {
        color: #8493b7;
      }
      .flash-container {
        margin: 1rem auto;
        max-width: 1100px;
      }
      .flash {
        padding: 0.9rem 1.1rem;
        border-radius: 0.5rem;
        margin-bottom: 0.75rem;
        color: #e2e8f0;
      }
      .flash-success {
        background: #132640;
        border: 1px solid #264975;
      }
      .flash-error {
        background: #1b2235;
        border: 1px solid #2d3f63;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Trips Workspace</strong>
    </header>
    <main>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-container">
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const fields = document.querySelectorAll('input:not([type=\"checkbox\"]):not([type=\"radio\"]):not([type=\"hidden\"]):not([type=\"submit\"]):not([type=\"button\"]), textarea, select');
        const updateFilledState = (field) => {
          const value = field.tagName === 'SELECT' ? field.value : field.value.trim();
          field.dataset.filled = value ? 'true' : 'false';
        };
        fields.forEach((field) => {
          updateFilledState(field);
          const eventName = field.tagName === 'SELECT' ? 'change' : 'input';
          field.addEventListener(eventName, () => updateFilledState(field));
        });

        document.querySelectorAll('[data-inline-form]').forEach((form) => {
          form.classList.add('readonly');
          const toggleEditable = () => {
            form.classList.remove('readonly');
            form.querySelectorAll('input, textarea, select').forEach((el) => {
              el.removeAttribute('readonly');
              el.removeAttribute('disabled');
            });
            const submit = form.querySelector('.inline-save');
            if (submit) {
              submit.disabled = false;
            }
          };
          form.addEventListener('dblclick', toggleEditable);
        });

        const aiForm = document.getElementById('ai-generate-form');
        if (aiForm) {
          const button = aiForm.querySelector('button');
          aiForm.addEventListener('submit', () => {
            if (button) {
              button.disabled = true;
              button.dataset.originalText = button.textContent;
              button.textContent = 'Generating…';
            }
          });
        }
      });
    </script>
  </body>
</html>
